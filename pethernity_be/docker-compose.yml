services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-cemetery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pet_cemetery
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pet_cemetery"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
